<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 🔮 TAROT READER 🔮 </title>
    <link rel="stylesheet" href="tarotgamesba.css">
    <script src="tarotgamesba.js" defer> </script>


</head>

<body>

    <section class="head-section">
        <h1> 🃏 THREE CARD READING 🃏 </h1>
        <p> ⭐️ Click the Shuffle Button To Draw Your Cards! 🔮 </p>
    </section>

    <div class="container">
        <div class="card" id="past-card">
            <h3> 🕰️ PAST 🕰️ </h3>
            <div class="card-image" id="displayingImg1">
                <img src="imgs/78CardBack.jpg" alt="Card Back" style="width:200px;">
            </div>
            <p class="description" id="displayDescription1"> </p>
        </div>

        <div class="card" id="present-card">
            <h3> 🧚🏿‍♀️ PRESENT 🧚🏿‍♀️ </h3>
            <div class="card-image">
                <img src="imgs/78CardBack.jpg" alt="Card Back" style="width:200px;">
            </div>
            <p class="card-description"> </p>

        </div>

        <div class="card" id="future-card">
            <h3> 🚀 FUTURE 🚀 </h3>
            <div class="card-image">
                <img src="imgs/78CardBack.jpg" alt="Card Back" style="width:200px;">
            </div>
            <p class="card-description"> </p>
        </div>
    </div>
    <input type="file" id="file-upload" accept="image/*">

    <button id="shuffle-button">Shuffle Cards</button>
    <button id="SHUFFLE">Re-Shuffle</button>


    </div>

    </div>

</body>

</html>
